<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Zaforix</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            padding-top: 12rem;
            padding-bottom: 4rem;
            text-align: center;
            background-color: var(--bg-color-1);
        }
        .page-header h1 {
            font-size: clamp(3rem, 6vw, 6rem);
            margin-bottom: 1rem;
        }
        form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }
        input, textarea {
            width: 100%;
            padding: 1rem;
            background-color: #111;
            border: 1px solid #333;
            color: white;
            font-family: var(--font-body);
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo-link" aria-label="Zaforix Home">
        <svg viewBox="0 0 100 100" class="logo-svg" xmlns="http://www.w3.org/2000/svg">
            <path d="M20,85 L50,15 L80,85 L50,65 Z" fill="currentColor"/>
        </svg>
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="vision.html">Vision</a></li>
        <li><a href="rd.html">R&D</a></li>
        <li><a href="concepts.html">Concepts</a></li>
        <li><a href="updates.html">Updates</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
</nav>

<main class="page-wrapper">
    <header class="page-header">
        <h1>Contact Us</h1>
        <p class="hero-tagline">Join the Inner Circle</p>
    </header>

    <section class="section alt-bg">
        <div class="section-content">
            <p>Direct inquiries regarding partnership, press, or to join our exclusive waitlist for future announcements.</p>
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message Sent. Welcome to Zaforix.');">
                <div>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div>
                    <textarea rows="5" placeholder="Your Inquiry..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Submit Transmission</button>
            </form>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Zaforix Automotive. All rights reserved.</p>
</footer>
